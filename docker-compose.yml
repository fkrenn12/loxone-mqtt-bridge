services:
  api:
    build:
      context: ./src
    container_name: loxone-mqtt-bridge
    restart: always
    stdin_open: true # docker run -i
    tty: true        # docker run -t
    environment:
      - API_PORT=${API_PORT}
      - UDP_PORT=${UDP_PORT}
      - TZ=${TZ}
    ports:
      - "${UDP_PORT}:${UDP_PORT}/udp"
      - "${API_PORT}:${API_PORT}"
    volumes:
      - ${SRC_MOUNT:-}
      - ./.loxone-mqtt-bridge/config:/usr/src/config

    networks:
      - backnet
    command:
      - /bin/sh
      - -c
      - |
        cd /usr/src/app
        uvicorn main:app ${RELOAD} --workers 1 --host "0.0.0.0" --port ${API_PORT} --proxy-headers
networks:
  backnet:


